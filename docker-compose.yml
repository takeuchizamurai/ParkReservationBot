version: "3.8"

services:
  reservation-bot:
    build: .
    container_name: reservation-bot
    ports:
      - "6080:6080"
    volumes:
      - ./account.csv:/app/account.csv:ro
      - ./screenshots:/app/screenshots
    environment:
      - PYTHONUNBUFFERED=1
      - DISPLAY=:99
    ipc: host
    init: true
    restart: "no"
    